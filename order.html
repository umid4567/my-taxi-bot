<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Buyurtma berish</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5&modules=multiRouter" type="text/javascript"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; overflow: hidden; }
        #map { width: 100%; height: 60vh; }
        
        /* Markazdagi pin (igna) */
        .center-pin {
            position: absolute; top: 30vh; left: 50%;
            transform: translate(-50%, -100%);
            z-index: 2000; pointer-events: none;
            width: 40px;
        }

        .order-panel {
            position: absolute; bottom: 0; width: 100%; height: 40vh;
            background: white; border-radius: 25px 25px 0 0;
            padding: 20px; box-sizing: border-box; text-align: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        
        .address-box { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .price-tag { font-size: 32px; font-weight: 800; color: #28a745; margin-bottom: 20px; }
        .btn-order {
            width: 100%; padding: 18px; background: #FFD700; color: black;
            border: none; border-radius: 15px; font-weight: bold; font-size: 18px;
            cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="center-pin" alt="pin">

    <div class="order-panel">
        <div class="address-box" id="address">Manzilni tanlang...</div>
        <div id="distance_info" style="color: #888; margin-bottom: 5px;">0 km</div>
        <div class="price-tag"><span id="estimated_price">5000</span> so'm</div>
        <button class="btn-order" onclick="placeOrder()">🚖 Buyurtma berish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        firebase.initializeApp({ databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" });
        const db = firebase.database();

        let myMap, route, startCoords, endCoords;
        const MIN_PRICE = 5000;
        const PER_KM = 2500;

        ymaps.ready(() => {
            // Mijozning hozirgi joyini olish
            navigator.geolocation.getCurrentPosition(pos => {
                startCoords = [pos.coords.latitude, pos.coords.longitude];
                
                myMap = new ymaps.Map("map", {
                    center: startCoords,
                    zoom: 16,
                    controls: []
                });

                // Xarita siljiganda markazdagi koordinatani olish
                myMap.events.add('actionend', () => {
                    endCoords = myMap.getCenter();
                    calculateRoute();
                    updateAddress(endCoords);
                });

                updateAddress(startCoords);
            });
        });

        // Marshrut va narxni hisoblash
        function calculateRoute() {
            if (route) myMap.geoObjects.remove(route);

            route = new ymaps.multiRouter.MultiRoute({
                referencePoints: [startCoords, endCoords],
                params: { routingMode: 'auto' }
            }, { routeActiveStrokeColor: "#FFD700", routeActiveStrokeWidth: 5 });

            myMap.geoObjects.add(route);

            route.model.events.add('requestsuccess', () => {
                const activeRoute = route.getActiveRoute();
                if (activeRoute) {
                    const dist = activeRoute.properties.get("distance").value / 1000;
                    const price = Math.round((MIN_PRICE + (dist * PER_KM)) / 500) * 500;
                    
                    document.getElementById('distance_info').innerText = dist.toFixed(1) + " km";
                    document.getElementById('estimated_price').innerText = price;
                }
            });
        }

        // Koordinatadan manzil nomini olish (Geocoding)
        function updateAddress(coords) {
            ymaps.geocode(coords).then(res => {
                const firstGeoObject = res.geoObjects.get(0);
                document.getElementById('address').innerText = firstGeoObject.getAddressLine();
            });
        }

        // Buyurtmani yuborish
        function placeOrder() {
    // 1. Elementlar mavjudligini tekshiramiz
    const priceElement = document.getElementById('estimated_price');
    const addressElement = document.getElementById('address');

    if (!priceElement || !addressElement) {
        console.error("HTML elementlar topilmadi!");
        return;
    }

    const price = priceElement.innerText;
    const address = addressElement.innerText;

    // 2. Telegram foydalanuvchi ma'lumotlarini olish
    if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
        alert("Telegram ma'lumotlari yuklanmadi!");
        return;
    }
    const userId = tg.initDataUnsafe.user.id;

    // 3. Koordinatalar tanlanganini tekshirish
    if (typeof startCoords === 'undefined' || !startCoords || typeof endCoords === 'undefined' || !endCoords) {
        alert("Iltimos, xaritadan yo'nalishni belgilang!");
        return;
    }

    const orderData = {
        id: userId,
        lat: startCoords[0],
        lon: startCoords[1],
        dest_lat: endCoords[0],
        dest_lon: endCoords[1],
        address: address,
        price: price,
        status: 'waiting',
        time: new Date().toLocaleTimeString(),
        // Mijozning ismini ham qo'shib yuboramiz (haydovchiga ko'rinishi uchun)
        name: tg.initDataUnsafe.user.first_name || "Mijoz"
    };

    // 4. Firebase-ga yozish
    db.ref('orders/' + userId).set(orderData)
        .then(() => {
            console.log("Buyurtma saqlandi");
            
            // Xatolikni oldini olish uchun try-catch ichida yuboramiz
            try {
                tg.sendData("order_placed_" + price);
            } catch (e) {
                console.log("sendData faqat Keyboard tugmasida ishlaydi");
            }
            
            // Web Appni yopish
            tg.close();
        })
        .catch((error) => {
            alert("Xatolik: " + error.message);
        });
}

    </script>
</body>
</html>
