<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Haydovchini kuzatish</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=f3032742-990a-427c-9407-7393430f89d3" type="text/javascript"></script>
    
    <style>
        body, html, #map { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; }
        .info-box {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.8); color: white; padding: 15px;
            border-radius: 10px; border: 1px solid #FFD700;
            text-align: center; z-index: 1000; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div class="info-box" id="status-text">🚕 Haydovchi kutilmoqda...</div>
    <div id="map"></div>
    
    <script>
        // 1. Firebase Sozlamalari
        const firebaseConfig = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 2. URL'dan ma'lumotlarni olish
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        let myMap;
        let driverMarker = null;

        ymaps.ready(init);

        function init() {
            myMap = new ymaps.Map("map", {
                center: [39.9469, 66.2625], // Kattaqo'rg'on markazi
                zoom: 15,
                controls: ['zoomControl', 'geolocationControl']
            });

            if (orderId) {
                trackThisOrder();
            } else {
                document.getElementById('status-text').innerText = "❌ Buyurtma topilmadi";
            }
        }

        function trackThisOrder() {
            // Aynan shu buyurtma bo'yicha haydovchi harakatini kuzatish
            db.ref('trips/' + orderId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                const pos = [data.lat, data.lon];
                const status = data.status;

                // Statusga qarab matnni o'zgartirish
                const statusMap = {
                    "coming": "🚕 Haydovchi sizga qarab kelmoqda",
                    "arrived": "🏁 Haydovchi yetib keldi! Tashqariga chiqing.",
                    "riding": "🚕 Safar davom etmoqda...",
                    "finished": "✅ Safar yakunlandi. Rahmat!"
                };
                document.getElementById('status-text').innerText = statusMap[status] || "🚕 Haydovchi yo'lda";

                // Mashina belgisini xaritaga qo'shish yoki yangilash
                if (!driverMarker) {
                    driverMarker = new ymaps.Placemark(pos, {
                        hintContent: 'Haydovchi'
                    }, {
                        iconLayout: 'default#image',
                        iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Sariq mashina iconkasi
                        iconImageSize: [40, 40],
                        iconImageOffset: [-20, -20]
                    });
                    myMap.geoObjects.add(driverMarker);
                } else {
                    // Silliq harakatlanish uchun marker koordinatasini yangilaymiz
                    driverMarker.geometry.setCoordinates(pos);
                }

                // Xaritani haydovchi markazida ushlab turish (ixtiyoriy)
                myMap.setCenter(pos, myMap.getZoom(), { duration: 1000 });
            });
        }
    </script>
</body>
</html>
