<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Haydovchini kuzatish</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=f3032742-990a-427c-9407-7393430f89d3" type="text/javascript"></script>
    
    <style>
        body, html, #map { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; }
        .info-box {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.85); color: white; padding: 15px;
            border-radius: 12px; border: 2px solid #FFD700;
            text-align: center; z-index: 1000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #status-text { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="info-box">
        <div id="status-text">🚕 Haydovchi aniqlanmoqda...</div>
    </div>
    <div id="map"></div>
    
    <script>
        // 1. Firebase Sozlamalari
        const firebaseConfig = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 2. URL'dan order_id ni olish
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        let myMap;
        let driverMarker = null;

        ymaps.ready(init);

        function init() {
            myMap = new ymaps.Map("map", {
                center: [39.9469, 66.2625], // Kattaqo'rg'on
                zoom: 16,
                controls: ['zoomControl', 'geolocationControl']
            });

            if (orderId) {
                trackThisOrder();
            } else {
                document.getElementById('status-text').innerText = "❌ Buyurtma ID topilmadi";
            }
        }

        function trackThisOrder() {
            // trips/ papkasini real vaqtda kuzatish
            db.ref('trips/' + orderId).on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (!data || !data.lat || !data.lon) {
                    document.getElementById('status-text').innerText = "⏳ Haydovchi lokatsiyasi kutilmoqda...";
                    return;
                }

                const pos = [parseFloat(data.lat), parseFloat(data.lon)];
                const status = data.status;

                // Statusga qarab mijozga ma'lumot berish
                const statusMap = {
                    "coming": "🚕 Haydovchi sizga qarab kelmoqda",
                    "arrived": "🏁 Haydovchi yetib keldi! Chiqishingiz mumkin",
                    "riding": "🚕 Safar davom etmoqda...",
                    "finished": "✅ Safar yakunlandi. Rahmat!"
                };
                
                document.getElementById('status-text').innerText = statusMap[status] || "🚕 Haydovchi yo'lda";

                // Mashina belgisini yangilash
                if (!driverMarker) {
                    driverMarker = new ymaps.Placemark(pos, {
                        hintContent: 'Taksi'
                    }, {
                        iconLayout: 'default#image',
                        iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Mashina rasmi
                        iconImageSize: [44, 44],
                        iconImageOffset: [-22, -22]
                    });
                    myMap.geoObjects.add(driverMarker);
                } else {
                    // Marker joyini silliq o'zgartirish
                    driverMarker.geometry.setCoordinates(pos);
                }

                // Haydovchi harakatiga qarab xaritani ham surib turish
                myMap.panTo(pos, { flying: true, duration: 1000 });
            }, (error) => {
                console.error("Firebase xatosi:", error);
                document.getElementById('status-text').innerText = "⚠️ Aloqa xatosi";
            });
        }
    </script>
</body>
</html>
