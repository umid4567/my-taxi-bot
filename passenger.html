<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Yo'lovchi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; margin: 0; text-align: center; background: #f4f4f4; }
        #map { width: 100%; height: 60vh; }
        .card { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-top-radius: 20px; box-shadow: 0 -5px 10px rgba(0,0,0,0.1); }
        .price { font-size: 35px; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="card">
        <div>Sizning hisobingiz:</div>
        <div class="price"><span id="p_price">0</span> so'm</div>
        <div id="p_info">Haydovchi harakatlanmoqda...</div>
    </div>

    <script>
        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const orderId = new URLSearchParams(window.location.search).get('order_id') || "test_trip";

        let myMap, marker;

        ymaps.ready(() => {
            myMap = new ymaps.Map("map", { center: [39.9469, 66.2625], zoom: 14 });
            
            db.ref('trips/' + orderId).on('value', s => {
                const data = s.val();
                if (data) {
                    document.getElementById('p_price').innerText = data.price;
                    document.getElementById('p_info').innerText = data.km + " km bosib o'tildi";
                    
                    const pos = [data.lat, data.lon];
                    if (!marker) {
                        marker = new ymaps.Placemark(pos, {}, { preset: 'islands#autoIcon', iconColor: '#ff0000' });
                        myMap.geoObjects.add(marker);
                    } else {
                        marker.geometry.setCoordinates(pos);
                    }
                    myMap.setCenter(pos);
                }
            });
        });
    </script>
</body>
</html>
