<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Kuzatuv</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { width: 100%; height: 60vh; background: #e5e3db; } /* Balandlikni biroz kamaytirdik */
        .card { 
            position: fixed; bottom: 0; width: 100%; height: 40vh; /* Balandlikni biroz oshirdik tugma sig'ishi uchun */
            background: white; padding: 20px; border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center;
        }
        .price { font-size: 36px; color: #28a745; font-weight: bold; margin: 5px 0; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .status-coming { background: #fff3e0; color: #ef6c00; }
        .status-arrived { background: #e3f2fd; color: #1565c0; }
        .status-riding { background: #e8f5e9; color: #2e7d32; }
        /* Qo'ng'iroq tugmasi stili */
        #btnCallDriver { 
            display: none; width: 100%; padding: 15px; margin-top: 15px; 
            background: #28a745; color: white; border: none; border-radius: 15px; 
            font-weight: bold; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="card">
        <div id="status_badge" class="status-badge status-coming">KUTILMOQDA</div>
        <div style="color: #666; font-size: 14px;">To'lov:</div>
        <div class="price"><span id="p_price">0</span> so'm</div>
        <div id="p_info" style="margin-top: 5px; color: #333; font-weight: 500;">Ma'lumotlar olinmoqda...</div>
        
        <button id="btnCallDriver" onclick="callDriver()">📞 HAYDOVCHIGA QO'NG'IROQ</button>
    </div>

    <script>
        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        let myMap, taxiMarker, driverPhone = null; // Raqam uchun o'zgaruvchi

        ymaps.ready(() => {
            myMap = new ymaps.Map("map", { center: [39.9469, 66.2625], zoom: 15, controls: ['zoomControl'] });

            if (!orderId) {
                document.getElementById('p_info').innerText = "ID topilmadi!";
                return;
            }

            db.ref('orders/' + orderId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                document.getElementById('p_price').innerText = data.price ? data.price.toLocaleString() : "0";

                const badge = document.getElementById('status_badge');
                const info = document.getElementById('p_info');

                if (data.status === "accepted" || data.status === "coming") {
                    badge.innerText = "🚕 Haydovchi kelyapti";
                    badge.className = "status-badge status-coming";
                    info.innerText = "Haydovchi siz tomonga yo'lga chiqdi";
                } else if (data.status === "arrived") {
                    badge.innerText = "🏁 Haydovchi keldi";
                    badge.className = "status-badge status-arrived";
                    info.innerText = "Haydovchi yetib keldi";
                } else if (data.status === "riding") {
                    badge.innerText = "🚀 Safar davom etmoqda";
                    badge.className = "status-badge status-riding";
                    info.innerText = (data.km || "0.0") + " km yo'l bosildi";
                }

                // --- QO'NG'IROQ MANTIQINI SHU YERGA QO'SHDIK ---
                if (data.driver_id) {
                    db.ref('users/' + data.driver_id).once('value', (uSnap) => {
                        const uData = uSnap.val();
                        if (uData && uData.phone) {
                            driverPhone = uData.phone;
                            document.getElementById('btnCallDriver').style.display = 'block';
                        }
                    });
                }

                if (data.driver_lat && data.driver_lon) {
                    const pos = [data.driver_lat, data.driver_lon];
                    if (!taxiMarker) {
                        taxiMarker = new ymaps.Placemark(pos, {}, {
                            iconLayout: 'default#image',
                            iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png',
                            iconImageSize: [40, 40]
                        });
                        myMap.geoObjects.add(taxiMarker);
                    } else {
                        taxiMarker.geometry.setCoordinates(pos);
                    }
                    myMap.panTo(pos, { flying: true, duration: 1000 });
                }
            });
        });

        // TUGMA BOSILGANDA ISHLAYDIGAN FUNKSIYA
        function callDriver() {
            if (driverPhone) {
                window.location.href = "tel:" + driverPhone;
            } else {
                alert("Haydovchi telefon raqami topilmadi!");
            }
        }
    </script>
</body>
</html>
