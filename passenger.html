<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Kuzatuv</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { width: 100%; height: 55vh; background: #e5e3db; }
        .card { 
            position: fixed; bottom: 0; width: 100%; height: 45vh;
            background: white; padding: 20px; border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15); box-sizing: border-box; text-align: center;
            z-index: 1000;
        }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .status-coming { background: #FFF9C4; color: #FBC02D; }
        .status-arrived { background: #E3F2FD; color: #1976D2; }
        .status-riding { background: #E8F5E9; color: #388E3C; }
        
        .price-label { color: #888; font-size: 14px; margin-bottom: 5px; }
        .price { font-size: 42px; color: #2E7D32; font-weight: 800; margin-bottom: 10px; }
        
        #btnCallDriver { 
            display: none; 
            width: 100%; padding: 18px; background: #28a745; color: white; 
            border: none; border-radius: 15px; font-weight: bold; font-size: 18px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        #btnCallDriver:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="card">
        <div id="status_badge" class="status-badge status-coming">Bog'lanmoqda...</div>
        <div class="price-label">To'lov miqdori:</div>
        <div class="price"><span id="p_price">5000</span> so'm</div>
        <div id="p_info" style="color: #555; margin-bottom: 20px;">Ma'lumotlar yuklanmoqda...</div>
        
        <button id="btnCallDriver" onclick="callDriver()">📞 HAYDOVCHIGA QO'NG'IROQ</button>
    </div>

    <script>
        // Firebase sozlamalari
        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        // URL'dan buyurtma ID sini olish
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        let myMap, taxiMarker, clientMarker, driverPhone = null;

        ymaps.ready(() => {
            if (!orderId) {
                alert("Buyurtma ID topilmadi!");
                return;
            }

            // Firebase'dan real vaqtda ma'lumotlarni kuzatish
            db.ref('orders/' + orderId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // --- XARITANI DINAMIK YARATISH ---
                if (!myMap) {
                    myMap = new ymaps.Map("map", { 
                        center: [parseFloat(data.lat) || 39.9, parseFloat(data.lon) || 66.2], 
                        zoom: 15, 
                        controls: ['zoomControl'] 
                    });
                }

                // 1. Narxni yangilash
                document.getElementById('p_price').innerText = data.price || "5000";

                // 2. Status va ma'lumotlarni yangilash
                const badge = document.getElementById('status_badge');
                const info = document.getElementById('p_info');

                if (data.status === "waiting") {
                    badge.innerText = "🔍 Qidirilmoqda";
                    info.innerText = "Haydovchi qidirilmoqda...";
                } else if (data.status === "accepted" || data.status === "coming") {
                    badge.innerText = "🚕 Haydovchi kelyapti";
                    badge.className = "status-badge status-coming";
                    info.innerText = "Haydovchi yo'lga chiqdi";
                } else if (data.status === "arrived") {
                    badge.innerText = "🏁 Haydovchi keldi";
                    badge.className = "status-badge status-arrived";
                    info.innerText = "Mashina eshigingiz oldida";
                } else if (data.status === "riding") {
                    badge.innerText = "🚀 Safar davom etmoqda";
                    badge.className = "status-badge status-riding";
                    info.innerText = (data.km || "0.00") + " km bosib o'tildi";
                }

                // 3. Haydovchi raqamini olish
                if (data.driver_id && !driverPhone) {
                    db.ref('users/' + data.driver_id).once('value', (uSnap) => {
                        const uData = uSnap.val();
                        if (uData && uData.phone) {
                            driverPhone = uData.phone;
                            document.getElementById('btnCallDriver').style.display = 'block';
                        }
                    });
                }

                // 4. Mijoz (Siz) nuqtangiz
                if (data.lat && data.lon) {
                    const cPos = [parseFloat(data.lat), parseFloat(data.lon)];
                    if (!clientMarker) {
                        clientMarker = new ymaps.Placemark(cPos, { balloonContent: 'Sizning joyingiz' }, { preset: 'islands#blueCircleDotIcon' });
                        myMap.geoObjects.add(clientMarker);
                    }
                }

                // 5. Haydovchi nuqtasi (Taxi harakati)
                if (data.driver_lat && data.driver_lon) {
                    const dPos = [parseFloat(data.driver_lat), parseFloat(data.driver_lon)];
                    if (!taxiMarker) {
                        taxiMarker = new ymaps.Placemark(dPos, {}, {
                            iconLayout: 'default#image',
                            iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Taksi ikonka linki
                            iconImageSize: [40, 40],
                            iconImageOffset: [-20, -20]
                        });
                        myMap.geoObjects.add(taxiMarker);
                    } else {
                        taxiMarker.geometry.setCoordinates(dPos);
                    }
                    
                    // Safar paytida yoki haydovchi kelayotganda xaritani unga qaratish
                    if (data.status === "riding" || data.status === "coming") {
                        myMap.panTo(dPos, { flying: true });
                    }
                }
            });
        });

        // Telefon qilish funksiyasi
        function callDriver() {
            if (driverPhone) {
                window.location.href = "tel:" + driverPhone;
            } else {
                alert("Haydovchi raqami hali aniqlanmadi");
            }
        }
    </script>
</body>
</html>
