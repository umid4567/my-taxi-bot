<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Yo'lovchi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { width: 100%; height: 65vh; background: #e5e3db; }
        .card { 
            position: fixed; bottom: 0; width: 100%; height: 35vh;
            background: white; padding: 20px; 
            border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.1); 
            box-sizing: border-box; text-align: center;
        }
        .price-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .price { font-size: 48px; color: #28a745; font-weight: bold; margin: 5px 0; }
        .info-box { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-top: 10px; border: 1px solid #eee; }
        #p_info { font-size: 18px; color: #333; font-weight: 500; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .status-coming { background: #fff3e0; color: #ef6c00; } /* Kelmoqda */
        .status-arrived { background: #e3f2fd; color: #1565c0; } /* Keldi */
        .status-riding { background: #e8f5e9; color: #2e7d32; } /* Yo'lda */
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="card">
        <div id="status_badge" class="status-badge status-coming">🚕 HAYDOVCHI QABUL QILDI</div>
        <div class="price-label">To'lov miqdori:</div>
        <div class="price"><span id="p_price">0</span> so'm</div>
        <div class="info-box">
            <div id="p_info">Haydovchi lokatsiyasi olinmoqda...</div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        let myMap, taxiMarker;

        ymaps.ready(init);

        function init() {
            myMap = new ymaps.Map("map", {
                center: [39.9469, 66.2625], // Kattaqo'rg'on markazi default
                zoom: 16,
                controls: ['zoomControl', 'geolocationControl']
            });

            if (!orderId) {
                document.getElementById('p_info').innerText = "Xatolik: Buyurtma ID topilmadi";
                return;
            }

            // Firebase dan "JONLI" kuzatish
db.ref('orders/' + orderId).on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        document.getElementById('p_price').innerText = data.price || 0;
        const badge = document.getElementById('status_badge');
        const info = document.getElementById('p_info');

        // Statuslarni Python va Haydovchi paneli bilan bir xil qildik
        if (data.status === "accepted" || data.status === "coming") {
            badge.innerText = "🚕 Haydovchi kelyapti";
            badge.className = "status-badge status-coming";
            info.innerText = "Haydovchi siz tomonga yo'lga chiqdi";
        } else if (data.status === "arrived") {
            badge.innerText = "🏁 Haydovchi keldi";
            badge.className = "status-badge status-arrived";
            info.innerText = "Haydovchi yetib keldi, chiqishingiz mumkin";
        } else if (data.status === "riding") {
            badge.innerText = "🚀 Safar davom etmoqda";
            badge.className = "status-badge status-riding";
            info.innerText = (data.km || "0.0") + " km yo'l bosildi";
        }

        // Haydovchi lokatsiyasi (driver_lat/lon o'qiladi)
        if (data.driver_lat && data.driver_lon) {
            const pos = [data.driver_lat, data.driver_lon];
            if (!taxiMarker) {
                taxiMarker = new ymaps.Placemark(pos, {}, {
                    iconLayout: 'default#image',
                    iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png',
                    iconImageSize: [40, 40]
                });
                myMap.geoObjects.add(taxiMarker);
            } else {
                taxiMarker.geometry.setCoordinates(pos);
            }
            myMap.panTo(pos, { flying: true });
        }
    }
});


                    // 3. Haydovchi koordinatalari va xaritada harakat
                    if (data.lat && data.lon) {
                        const pos = [data.lat, data.lon];
                        if (!taxiMarker) {
                            taxiMarker = new ymaps.Placemark(pos, { balloonContent: 'Sizning taksingiz' }, {
                                iconLayout: 'default#image',
                                iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Taksi ikonchasi
                                iconImageSize: [40, 40],
                                iconImageOffset: [-20, -20]
                            });
                            myMap.geoObjects.add(taxiMarker);
                            myMap.setCenter(pos);
                        } else {
                            // Ikonkani silliq harakatlantirish
                            taxiMarker.geometry.setCoordinates(pos);
                        }
                        
                        // Haydovchi harakatlanganda xarita uni markazda ushlab turadi
                        myMap.panTo(pos, { flying: true, duration: 1000 });
                    }
                } else {
                    info.innerText = "Buyurtma ma'lumotlari kutilmoqda...";
                }
            });
        }
    </script>
</body>
</html>
