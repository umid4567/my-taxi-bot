<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Yo'lovchi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .price { font-size: 36px; color: #28a745; font-weight: bold; margin: 15px 0; }
        .driver-info { border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; }
        .status-badge { background: #ffc107; padding: 5px 15px; border-radius: 50px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status" class="status-badge">Haydovchi qidirilmoqda...</div>
        <div class="price"><span id="live_summa">0</span> so'm</div>
        <div id="distance">Masofa: 0.0 km</div>

        <div class="driver-info" id="driver_box" style="display:none;">
            <p>🚕 <b>Haydovchi yo'lda</b></p>
            <p id="driver_name">Ism: ...</p>
            <a id="driver_phone" href="tel:+998" style="text-decoration:none; color:#007bff; font-weight:bold;">📞 Qo'ng'iroq qilish</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Bu yerda Firebase orqali haydovchining jonli lokatsiyasini 
        // va hisoblanayotgan summani yo'lovchiga ko'rsatib turamiz.
        // Hozircha haydovchi Web App yuborgan ma'lumotni bu yerga ulaymiz.
    </script>
</body>
</html>
