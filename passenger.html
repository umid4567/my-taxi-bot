<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Yo'lovchi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { width: 100%; height: 65vh; background: #e5e3db; }
        .card { 
            position: fixed; bottom: 0; width: 100%; height: 35vh;
            background: white; padding: 25px; 
            border-radius: 25px 25px 0 0; 
            box-shadow: 0 -10px 20px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            text-align: center;
        }
        .price-label { font-size: 16px; color: #666; margin-bottom: 5px; }
        .price { font-size: 42px; color: #28a745; font-weight: bold; margin-bottom: 10px; }
        .info { font-size: 18px; color: #333; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .status-dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="card">
        <div class="price-label">Safar haqi:</div>
        <div class="price"><span id="p_price">0</span> so'm</div>
        <div class="info">
            <span class="status-dot"></span>
            <span id="p_info">Haydovchi qidirilmoqda...</span>
        </div>
    </div>

    <script>
        // Firebase sozlamalari
        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // Order ID ni URL dan olish
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id') || "test_trip";

        let myMap, taxiMarker;

        ymaps.ready(init);

        function init() {
            // Xaritani yaratish
            myMap = new ymaps.Map("map", {
                center: [39.9976, 66.2657], // Kattakurgan
                zoom: 16,
                controls: ['zoomControl']
            });

            // Firebase dan ma'lumotni "JONLI" (on value) eshitish
            db.ref('trips/' + orderId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.lat && data.lon) {
                    const pos = [data.lat, data.lon];
                    
                    // Narx va masofani yangilash
                    document.getElementById('p_price').innerText = data.price || 0;
                    document.getElementById('p_info').innerText = (data.km || 0) + " km yo'l yurildi";

                    // Haydovchi belgisini yangilash
                    if (!taxiMarker) {
                        taxiMarker = new ymaps.Placemark(pos, {
                            balloonContent: 'Sizning haydovchingiz'
                        }, {
                            preset: 'islands#taxiIcon', // Taksicha belgisi
                            iconColor: '#fbc02d'
                        });
                        myMap.geoObjects.add(taxiMarker);
                    } else {
                        // Markerni silliq harakatlantirish
                        taxiMarker.geometry.setCoordinates(pos);
                    }
                    
                    // Xaritani haydovchi markazida ushlab turish
                    myMap.setCenter(pos, 16, { checkZoomRange: true });
                }
            });
        }
    </script>
</body>
</html>
