<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Taksimetr</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 45vh; background-color: #252525; }
        .taxi-panel { height: 55vh; padding: 15px; text-align: center; background: #252525; border-top: 4px solid #FFD700; border-radius: 25px 25px 0 0; box-sizing: border-box; }
        .price-display { font-size: 45px; font-weight: bold; color: #00FF00; margin: 5px 0; }
        .distance-display { font-size: 18px; color: #aaa; margin-bottom: 5px; }
        .btn { width: 95%; padding: 16px; margin: 5px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-arrived { background: #ffc107; color: black; }
        .btn-start { background: #28a745; color: white; display: none; }
        .btn-finish { background: #dc3545; color: white; display: none; }
        .btn-call { background: #007bff; color: white; margin-top: 5px; }
        .btn-cancel { background: #444; color: #bbb; font-size: 11px; padding: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="taxi-panel">
        <div id="status" style="font-weight: bold; color: #FFD700;">🚕 Mijoz kutilmoqda...</div>
        <div class="distance-display"><span id="km">0.00</span> km</div>
        <div class="price-display"><span id="summa">5000</span> so'm</div>
        
        <button id="btnArrived" class="btn btn-arrived" onclick="arrived()">🏁 Keldim</button>
        <button id="btnStart" class="btn btn-start" onclick="startTrip()">🚀 Safarni boshlash</button>
        <button id="btnFinish" class="btn btn-finish" onclick="finishTrip()">🏁 Safarni yakunlash</button>
        
        <button class="btn btn-call" onclick="callClient()">📞 MIJOZGA QO'NG'IROQ</button>
        <button id="btnCancel" class="btn btn-cancel" onclick="cancelOrder()">❌ Buyurtmani bekor qilish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id'); 
        const driverUid = params.get('driver_id');
        const clat = parseFloat(params.get('clat'));
        const clon = parseFloat(params.get('clon'));

        let myMap, driverMarker, clientMarker, lastPos = null, totalDist = 0, isTripStarted = false;

        function init() {
            ymaps.ready(() => {
                myMap = new ymaps.Map("map", { 
                    center: [clat || 39.9, clon || 66.2], 
                    zoom: 15, controls: ['zoomControl', 'geolocationControl']
                });

                // Mijoz turgan joyga marker qo'yish
                if (clat && clon) {
                    clientMarker = new ymaps.Placemark([clat, clon], { balloonContent: 'Mijoz shu yerda' }, {
                        preset: 'islands#redDotIcon'
                    });
                    myMap.geoObjects.add(clientMarker);
                }

                acceptOrder();
                startTracking();
            });
        }

        function acceptOrder() {
            if (!orderId || !driverUid) return;
            db.ref('orders/' + orderId).transaction((data) => {
                if (data && (data.status === 'waiting' || data.driver_id === driverUid)) {
                    data.status = 'accepted';
                    data.driver_id = driverUid;
                    return data;
                }
                return;
            }, (err, committed) => {
                if (!committed) { alert("Xato: Buyurtma band!"); tg.close(); }
            });
        }

        function startTracking() {
            navigator.geolocation.watchPosition(p => {
                const cur = [p.coords.latitude, p.coords.longitude];

                if (!driverMarker) {
                    driverMarker = new ymaps.Placemark(cur, {}, { preset: 'islands#greenTaxiIcon' });
                    myMap.geoObjects.add(driverMarker);
                } else {
                    driverMarker.geometry.setCoordinates(cur);
                }

                if(orderId) db.ref('orders/' + orderId).update({ driver_lat: cur[0], driver_lon: cur[1] });

                if (isTripStarted) {
                    if (lastPos) {
                        const d = ymaps.coordSystem.geo.getDistance(lastPos, cur);
                        if (d > 2) { 
                            totalDist += d;
                            updateUI();
                            lastPos = cur;
                        }
                    } else { lastPos = cur; }
                }
            }, null, { enableHighAccuracy: true });
        }

        function updateUI() {
            const km = totalDist / 1000;
            const price = Math.round((5000 + (km * 2500)) / 500) * 500;
            document.getElementById('km').innerText = km.toFixed(2);
            document.getElementById('summa').innerText = price;
            if(orderId) db.ref('orders/' + orderId).update({ km: km.toFixed(2), price: price });
        }

        function arrived() {
            document.getElementById('status').innerText = "🏁 Mijoz kutilmoqda";
            document.getElementById('btnArrived').style.display = 'none';
            document.getElementById('btnStart').style.display = 'inline-block';
            if(orderId) db.ref('orders/' + orderId).update({ status: "arrived" });
        }

        function startTrip() {
            isTripStarted = true;
            totalDist = 0; lastPos = null;
            document.getElementById('status').innerText = "🚀 Yo'lda...";
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnFinish').style.display = 'inline-block';
            if(orderId) db.ref('orders/' + orderId).update({ status: "riding" });
            updateUI();
        }

        function finishTrip() {
            const total = document.getElementById('summa').innerText;
            if(orderId) {
                db.ref('orders/' + orderId).update({ status: "finished" });
                setTimeout(() => db.ref('orders/' + orderId).remove(), 3000);
            }
            tg.sendData("finish_" + total);
            setTimeout(() => tg.close(), 500);
        }

        function cancelOrder() {
            if(confirm("Bekor qilinsinmi?")) {
                db.ref('orders/' + orderId).update({ status: "waiting", driver_id: null }).then(() => tg.close());
            }
        }

        function callClient() {
            db.ref('users/' + orderId).once('value', s => {
                const u = s.val();
                if (u && u.phone) window.location.href = "tel:" + u.phone;
                else alert("Raqam topilmadi!");
            });
        }

        window.onload = init;
    </script>
</body>
</html>
