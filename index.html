<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Navigator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="margin: 0; padding: 0; text-align: center; font-family: sans-serif; background: #1a1a1a; color: white;">
    <h2 style="color: #FFD700; margin-top: 20px;">AXI TAXI</h2>
    <p id="status">Sun'iy yo'ldosh qidirilmoqda...</p>
    <div id="coords" style="font-size: 14px; color: #FFD700; font-weight: bold; margin-top: 10px;"></div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const firebaseConfig = {
        databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userId = "unknown";

    // ID-ni aniqlash funksiyasi (kutish bilan)
    function initUser() {
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            document.getElementById('status').innerHTML = "🟢 Liniyadasiz (ID: " + userId + ")";
            startTracking(); // ID topilgandan keyin lokatsiyani boshlaymiz
        } else {
            document.getElementById('status').innerHTML = "🟡 Telegram bilan bog'lanilmoqda...";
            setTimeout(initUser, 1000); // 1 soniyadan keyin qayta urinib ko'radi
        }
    }

    function startTracking() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Faqat ID aniq bo'lsa bazaga yozamiz
                if (userId !== "unknown") {
                    database.ref('driver_location/' + userId).set({
                        lat: lat,
                        lon: lon,
                        last_update: new Date().getTime()
                    });
                }

                document.getElementById('coords').innerHTML = "📍 " + lat.toFixed(5) + ", " + lon.toFixed(5);
            }, function(error) {
                document.getElementById('status').innerHTML = "🔴 GPS ruxsat bermadi";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 10000
            });
        }
    }

    window.onload = initUser;

</script>

</body>
</html>
