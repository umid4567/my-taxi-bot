<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Navigator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 70vh; background: #222; }
        .info-panel { padding: 10px; text-align: center; height: 30vh; box-sizing: border-box; }
        #status { font-weight: bold; color: orange; margin: 5px 0; }
        #coords { font-size: 14px; color: #FFD700; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="map"></div> <div class="info-panel">
        <h2 style="color: #FFD700; margin: 5px 0;">AXI TAXI</h2>
        <p id="status">🟡 Tizim kutilmoqda...</p>
        <div id="coords">📍 GPS qidirilmoqda...</div>
        <button onclick="location.reload()" style="padding: 10px; background: #FFD700; border: none; border-radius: 5px; font-weight: bold;">🔄 Yangilash</button>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const firebaseConfig = {
        databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userId = "unknown";
    let myMap, multiRoute;
    let userLat, userLon;

    // Linkdan mijoz koordinatalarini olish (clat va clon)
    const urlParams = new URLSearchParams(window.location.search);
    const clientLat = urlParams.get('clat');
    const clientLon = urlParams.get('clon');

    function initApp() {
        const user = tg.initDataUnsafe?.user;
        userId = user ? user.id : "test_driver";

        document.getElementById('status').innerHTML = "🟢 Liniyadasiz";
        document.getElementById('status').style.color = "#00FF00";

        // Xaritani ishga tushirish
        ymaps.ready(function () {
            myMap = new ymaps.Map("map", {
                center: [39.997, 65.924], // Kattaqo'rg'on markazi
                zoom: 14,
                controls: ['zoomControl', 'geolocationControl']
            });
            startGPS();
        });
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;

                // Bazaga lokatsiyani yozish
                database.ref('driver_location/' + userId).set({
                    lat: userLat,
                    lon: userLon,
                    last_update: Date.now()
                });

                document.getElementById('coords').innerHTML = "📍 " + userLat.toFixed(5) + ", " + userLon.toFixed(5);

                // Agar mijoz koordinatalari bo'lsa, marshrut chizish
                if (clientLat && clientLon) {
                    drawRoute(userLat, userLon, clientLat, clientLon);
                } else {
                    // Marshrut bo'lmasa, shunchaki xaritani markazlashtirish
                    myMap.setCenter([userLat, userLon], 16);
                }

            }, function(err) {
                document.getElementById('status').innerHTML = "🔴 GPS-ga ruxsat bering!";
                document.getElementById('status').style.color = "red";
            }, { enableHighAccuracy: true });
        }
    }

    function drawRoute(sLat, sLon, eLat, eLon) {
        if (multiRoute) {
            myMap.geoObjects.remove(multiRoute);
        }

        multiRoute = new ymaps.multiRouter.MultiRoute({
            referencePoints: [
                [sLat, sLon], // Haydovchi
                [eLat, eLon]  // Mijoz
            ],
            params: { routingMode: 'auto' }
        }, {
            boundsAutoApply: true,
            routeActiveStrokeWidth: 6,
            routeActiveStrokeColor: "#0000FF"
        });

        myMap.geoObjects.add(multiRoute);
    }

    window.onload = initApp;
    </script>
</body>
</html>
