<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Navigator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 65vh; background: #222; }
        .info-panel { padding: 15px; text-align: center; height: 35vh; box-sizing: border-box; background: #252525; border-top: 3px solid #FFD700; border-radius: 20px 20px 0 0; position: relative; z-index: 10; }
        #status { font-weight: bold; color: #FFD700; margin-bottom: 10px; font-size: 18px; }
        .btn-group { display: flex; justify-content: space-around; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .btn-call { background: #28a745; color: white; }
        .btn-arrived { background: #ffc107; color: black; }
        .btn-refresh { background: #6c757d; color: white; }
        #coords { font-size: 11px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="info-panel">
        <div id="status">🚕 Yo'nalish kutilmoqda...</div>
        
        <div class="btn-group">
            <button class="btn btn-call" onclick="callClient()">📞 Tel qilish</button>
            <button class="btn btn-arrived" onclick="notifyArrived()">🏁 Keldim</button>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-refresh" onclick="location.reload()">🔄 Yangilash</button>
        </div>

        <div id="coords">📍 GPS aniqlanmoqda...</div>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const firebaseConfig = {
        databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userId = "unknown";
    let myMap, multiRoute, driverMarker;
    let userLat, userLon;
    let routeCreated = false;

    const urlParams = new URLSearchParams(window.location.search);
    const clientLat = urlParams.get('clat');
    const clientLon = urlParams.get('clon');

    function initApp() {
        const user = tg.initDataUnsafe?.user;
        userId = user ? user.id : "driver_test";

        ymaps.ready(function () {
            myMap = new ymaps.Map("map", {
                center: [39.997, 65.924], 
                zoom: 15,
                controls: ['zoomControl', 'geolocationControl']
            });
            
            driverMarker = new ymaps.Placemark([0,0], {}, {
                preset: 'islands#blueAutoCircleIcon'
            });
            myMap.geoObjects.add(driverMarker);
            
            startGPS();
        });
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;

                database.ref('driver_location/' + userId).update({
                    lat: userLat,
                    lon: userLon,
                    last_update: Date.now()
                });

                document.getElementById('coords').innerHTML = "📍 Pozitsiya: " + userLat.toFixed(5) + ", " + userLon.toFixed(5);
                
                if (driverMarker) driverMarker.geometry.setCoordinates([userLat, userLon]);

                if (clientLat && clientLon && !routeCreated) {
                    document.getElementById('status').innerHTML = "🚕 Mijoz sari yo'lga!";
                    drawRoute(userLat, userLon, clientLat, clientLon);
                    routeCreated = true; 
                }
            }, null, { enableHighAccuracy: true });
        }
    }

    function drawRoute(sLat, sLon, eLat, eLon) {
        multiRoute = new ymaps.multiRouter.MultiRoute({
            referencePoints: [[parseFloat(sLat), parseFloat(sLon)], [parseFloat(eLat), parseFloat(eLon)]],
            params: { routingMode: 'auto' }
        }, {
            boundsAutoApply: true,
            routeActiveStrokeWidth: 6,
            routeActiveStrokeColor: "#0000FF"
        });
        myMap.geoObjects.add(multiRoute);
    }

    function callClient() {
        // Bu yerda bot orqali mijoz bilan bog'lanish yoki tel raqamga yo'naltirish mumkin
        tg.showAlert("Mijoz bilan bog'lanish xizmati faollashtirilmoqda...");
    }

    function notifyArrived() {
        tg.sendData("arrived_" + userId); // Botga "Keldim" degan signal yuboradi
        tg.close();
    }

    window.onload = initApp;
    </script>
</body>
</html>
