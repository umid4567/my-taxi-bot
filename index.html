<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Taksimetr</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 45vh; background-color: #252525; }
        .taxi-panel { height: 55vh; padding: 15px; text-align: center; background: #252525; border-top: 4px solid #FFD700; border-radius: 25px 25px 0 0; box-sizing: border-box; }
        .price-display { font-size: 45px; font-weight: bold; color: #00FF00; margin: 10px 0; }
        .distance-display { font-size: 20px; color: #aaa; margin-bottom: 10px; }
        .btn { width: 95%; padding: 18px; margin: 5px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }
        .btn-arrived { background: #ffc107; color: black; }
        .btn-start { background: #28a745; color: white; display: none; }
        .btn-finish { background: #dc3545; color: white; display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="taxi-panel">
        <div id="status">🚕 Mijozga borilmoqda...</div>
        <div class="distance-display"><span id="km">0.00</span> km</div>
        <div class="price-display"><span id="summa">5000</span> so'm</div>
        
        <button id="btnArrived" class="btn btn-arrived" onclick="arrived()">🏁 Keldim</button>
        <button id="btnStart" class="btn btn-start" onclick="startTrip()">🚀 Safarni boshlash</button>
        <button id="btnFinish" class="btn btn-finish" onclick="finishTrip()">🏁 Tugatish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        firebase.initializeApp({ databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" });
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id') || params.get('id'); 
        const driverId = params.get('driver_id');

        let myMap, driverMarker, lastPos, totalDist = 0, isTripStarted = false;

        ymaps.ready(() => {
            myMap = new ymaps.Map("map", { center: [39.9, 66.2], zoom: 15 });
            startTracking();
        });

        function startTracking() {
            navigator.geolocation.watchPosition(p => {
                const cur = [p.coords.latitude, p.coords.longitude];

                if (!driverMarker) {
                    driverMarker = new ymaps.Placemark(cur, {}, { preset: 'islands#greenTaxiIcon' });
                    myMap.geoObjects.add(driverMarker);
                } else {
                    driverMarker.geometry.setCoordinates(cur);
                }

                // Bazaga lokatsiyani yuborish
                if (orderId) db.ref('orders/' + orderId).update({ driver_lat: cur[0], driver_lon: cur[1] });

                // MASOFA VA PUL HISOBLASH
                if (isTripStarted && lastPos) {
                    const d = ymaps.coordSystem.geo.getDistance(lastPos, cur);
                    if (d > 1) { // 1 metrdan oshsa hisoblaydi
                        totalDist += d;
                        updateUI();
                    }
                }
                lastPos = cur;
            }, (err) => console.error(err), { enableHighAccuracy: true, distanceFilter: 1 });
        }

        function updateUI() {
            const km = totalDist / 1000;
            // Narx: 5000 (start) + har km uchun 2500 so'm
            const price = 5000 + (km * 2500);
            // 500 so'mga yaxlitlash (masalan 6200 -> 6500)
            const finalPrice = Math.round(price / 500) * 500;
            
            document.getElementById('km').innerText = km.toFixed(2);
            document.getElementById('summa').innerText = finalPrice;

            if (orderId) {
                db.ref('orders/' + orderId).update({
                    price: finalPrice,
                    km: km.toFixed(2)
                });
            }
        }

        function arrived() {
            document.getElementById('status').innerText = "🏁 Mijoz kutilmoqda";
            document.getElementById('btnArrived').style.display = 'none';
            document.getElementById('btnStart').style.display = 'inline-block';
            if (orderId) db.ref('orders/' + orderId).update({ status: 'arrived' });
        }

        function startTrip() {
            isTripStarted = true;
            totalDist = 0; // Safar boshlanganda masofani 0 dan boshlaymiz
            document.getElementById('status').innerText = "🚀 Yo'lda...";
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnFinish').style.display = 'inline-block';
            if (orderId) db.ref('orders/' + orderId).update({ status: 'riding' });
            updateUI(); // Darhol bazaga 5000 ni uradi
        }

        function finishTrip() {
            const total = document.getElementById('summa').innerText;
            if (orderId) {
                db.ref('orders/' + orderId).update({ status: 'finished' });
                setTimeout(() => { db.ref('orders/' + orderId).remove(); }, 3000);
            }
            tg.sendData("finish_" + total);
            setTimeout(() => { tg.close(); }, 500);
        }
    </script>
</body>
</html>
