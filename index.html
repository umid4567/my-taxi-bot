<!DOCTYPE html>
<html lang="uz">
<head>
    <title>Umut Taxi - Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=784e6223-9556-4b82-8419-75691062064c" type="text/javascript"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
        #info { position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info">Haydovchi va mijoz qidirilmoqda...</div>
    <div id="map"></div>

    <script type="text/javascript">
        const firebaseConfig = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        ymaps.ready(init);

        function init(){
            var myMap = new ymaps.Map("map", { center: [39.9469, 66.2625], zoom: 14, controls: ['zoomControl'] });

            var driverMarker = new ymaps.Placemark([39.9469, 66.2625], {}, {
                iconLayout: 'default#image',
                iconImageHref: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
                iconImageSize: [36, 36], iconImageOffset: [-18, -18]
            });

            var clientMarker = new ymaps.Placemark([39.9469, 66.2625], {}, { preset: 'islands#blueCircleDotIcon' });
            myMap.geoObjects.add(driverMarker).add(clientMarker);

            var multiRoute = null;

            function updateRoute(d_pos, c_pos) {
                if (multiRoute) { myMap.geoObjects.remove(multiRoute); }

                multiRoute = new ymaps.multiRouter.MultiRoute({
                    referencePoints: [d_pos, c_pos],
                    params: { routingMode: 'auto' }
                }, {
                    wayPointVisible: false,
                    routeActiveStrokeWidth: 5,
                    routeActiveStrokeColor: "#ffcc00"
                });

                myMap.geoObjects.add(multiRoute);

                multiRoute.model.events.add('requestsuccess', function() {
                    var activeRoute = multiRoute.getActiveRoute();
                    if (activeRoute) {
                        var dist = activeRoute.properties.get("distance").text;
                        var time = activeRoute.properties.get("duration").text;
                        document.getElementById('info').innerHTML = "🚕 Masofa: <b>" + dist + "</b> | Kelish vaqti: <b>" + time + "</b>";
                    }
                });
            }

            let driverData = null, clientData = null;

            // Haydovchini kuzatish
            db.ref('driver_location').on('value', (snap) => {
                driverData = snap.val();
                if (driverData) {
                    let d_pos = [driverData.lat, driverData.lon];
                    driverMarker.geometry.setCoordinates(d_pos);
                    if (clientData) updateRoute(d_pos, [clientData.lat, clientData.lon]);
                }
            });

            // Mijozni kuzatish
            db.ref('client_location').on('value', (snap) => {
                clientData = snap.val();
                if (clientData) {
                    let c_pos = [clientData.lat, clientData.lon];
                    clientMarker.geometry.setCoordinates(c_pos);
                    if (driverData) updateRoute([driverData.lat, driverData.lon], c_pos);
                }
            });
        }
    </script>
</body>
</html>
