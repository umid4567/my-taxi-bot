<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Navigator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="margin: 0; padding: 0; text-align: center; font-family: sans-serif; background: #1a1a1a; color: white;">
    <h2 style="color: #FFD700; margin-top: 20px;">AXI TAXI</h2>
    <p id="status" style="font-weight: bold; color: orange;">🟡 Telegram bog'lanishi kutilmoqda...</p>
    <div id="coords" style="font-size: 14px; color: #FFD700; font-weight: bold; margin-top: 10px;">📍 Lokatsiya qidirilmoqda...</div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready(); // Telegramga "Men tayyorman" deb xabar berish
    tg.expand();

    const firebaseConfig = {
        databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userId = "unknown";

    function startApp() {
        // ID ni bir necha usulda tekshiramiz
        const user = tg.initDataUnsafe?.user;

        if (user && user.id) {
            userId = user.id;
            const statusEle = document.getElementById('status');
            statusEle.innerHTML = "🟢 Liniyadasiz (ID: " + userId + ")";
            statusEle.style.color = "#00FF00";
            
            // ID topilgach, darrov GPS ni yoqamiz
            startGPS();
        } else {
            // Agar topilmasa, yana 1 soniya kutib qayta urinadi
            setTimeout(startApp, 1000);
        }
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // Firebasega yuborish
                database.ref('driver_location/' + userId).set({
                    lat: lat,
                    lon: lon,
                    last_update: Date.now()
                });

                document.getElementById('coords').innerHTML = "📍 " + lat.toFixed(5) + ", " + lon.toFixed(5);
            }, function(err) {
                document.getElementById('status').innerHTML = "🔴 GPS ruxsat bermadi!";
                document.getElementById('status').style.color = "red";
            }, { enableHighAccuracy: true });
        }
    }

    // Dasturni yurgizish
    window.onload = startApp;
    </script>
</body>
</html>
