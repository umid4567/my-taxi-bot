<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Haydovchi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; }
        #map { width: 100%; height: 50vh; }
        .panel { padding: 20px; background: #222; border-top: 3px solid #fbc02d; }
        .summa { font-size: 45px; font-weight: bold; color: #4caf50; margin: 10px 0; }
        .btn { width: 90%; padding: 15px; margin: 10px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .start { background: #4caf50; color: white; }
        .stop { background: #f44336; color: white; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <div id="status">Kuting...</div>
        <div class="summa"><span id="price">0</span> so'm</div>
        <div id="info">0.0 km</div>
        <button id="btnAction" class="btn start" onclick="toggleTrip()">SAFARNI BOSHLASH</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let isRunning = false, totalDist = 0, lastPos = null, watchId = null;
        const orderId = new URLSearchParams(window.location.search).get('order_id') || "test_trip";

        function toggleTrip() {
            const btn = document.getElementById('btnAction');
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "SAFARNI YAKUNLASH";
                btn.className = "btn stop";
                startTracking();
            } else {
                navigator.geolocation.clearWatch(watchId);
                tg.close();
            }
        }

        function startTracking() {
            watchId = navigator.geolocation.watchPosition(p => {
                const cur = { lat: p.coords.latitude, lon: p.coords.longitude };
                if (lastPos) {
                    const d = ymaps.coordSystem.geo.getDistance([lastPos.lat, lastPos.lon], [cur.lat, cur.lon]);
                    totalDist += d;
                    const km = totalDist / 1000;
                    const price = 5000 + (km * 2000); // 5000 kirish, 2000 har km uchun
                    const finalPrice = Math.round(price / 500) * 500;
                    
                    document.getElementById('price').innerText = finalPrice;
                    document.getElementById('info').innerText = km.toFixed(1) + " km";

                    db.ref('trips/' + orderId).set({
                        lat: cur.lat, lon: cur.lon,
                        price: finalPrice, km: km.toFixed(1)
                    });
                }
                lastPos = cur;
            }, null, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
