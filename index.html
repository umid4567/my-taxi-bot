<!DOCTYPE html>
<html>
<head>
    <title>Umut Taxi Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=784e6223-9556-4b82-8419-75691062064c" type="text/javascript"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 100; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="info">Haydovchi yo'lda...</div>
    <div id="map"></div>
    <script type="text/javascript">
        ymaps.ready(init);
        function init(){
            var myMap = new ymaps.Map("map", {
                center: [39.9469, 66.2625], 
                zoom: 14
            });
            var driverMarker = new ymaps.Placemark([39.9469, 66.2625], {
                hintContent: 'Haydovchi shu yerda',
                balloonContent: 'Haydovchi: Umut Home'
            }, {
                preset: 'islands#darkGreenAutoIcon',
                iconColor: '#ff0000'
            });
            myMap.geoObjects.add(driverMarker);
        }
    </script>
</body>
</html>
