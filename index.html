<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Taksimetr</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 50vh; }
        .taxi-panel { height: 50vh; padding: 20px; text-align: center; background: #252525; border-top: 4px solid #FFD700; border-radius: 25px 25px 0 0; box-sizing: border-box; }
        .price-display { font-size: 48px; font-weight: bold; color: #00FF00; margin: 10px 0; }
        .distance-display { font-size: 20px; color: #aaa; }
        .btn { width: 90%; padding: 18px; margin: 10px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }
        .btn-arrived { background: #ffc107; color: black; }
        .btn-start { background: #28a745; color: white; display: none; }
        .btn-finish { background: #dc3545; color: white; display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="taxi-panel">
        <div id="status">🚕 Mijozga borilmoqda...</div>
        <div class="distance-display"><span id="km">0.0</span> km</div>
        <div class="price-display"><span id="summa">0</span> so'm</div>
        
        <button id="btnArrived" class="btn btn-arrived" onclick="arrived()">🏁 Keldim</button>
        <button id="btnStart" class="btn btn-start" onclick="startTrip()">🚀 Safarni boshlash</button>
        <button id="btnFinish" class="btn btn-finish" onclick="finishTrip()">🏁 Safarni yakunlash</button>
        <button onclick="callClient()" style="background: #0088cc; color: white; width: 90%; padding: 15px; margin: 10px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px;">
    🔹 TELEGRAMDAN ALOQA</button>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        let myMap, multiRoute, driverMarker = null, lastPos = null;
        let totalDist = 0;
        let isTripStarted = false;

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id') || "trip_" + Date.now();
        const clat = urlParams.get('clat'), clon = urlParams.get('clon');

        function init() {
            ymaps.ready(() => {
                myMap = new ymaps.Map("map", { 
                    center: [39.997, 66.265], 
                    zoom: 15,
                    controls: ['zoomControl', 'geolocationControl']
                });
                
                startTracking();
                if(clat && clon) drawRoute(clat, clon);
            });
        }

        function startTracking() {
            navigator.geolocation.watchPosition(p => {
                const cur = { lat: p.coords.latitude, lon: p.coords.longitude };
                const coords = [cur.lat, cur.lon];

                // 1. Haydovchi belgisini (Marker) yangilash yoki yaratish
                if (!driverMarker) {
                    driverMarker = new ymaps.Placemark(coords, {
                        hintContent: 'Sizning joyingiz'
                    }, {
                        iconLayout: 'default#image',
                        iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', // Mashina rasmi
                        iconImageSize: [40, 40],
                        iconImageOffset: [-20, -20]
                    });
                    myMap.geoObjects.add(driverMarker);
                } else {
                    driverMarker.geometry.setCoordinates(coords);
                }

                // 2. Firebase'ga yuborish (Mijoz kuzatishi uchun)
                db.ref('trips/' + orderId).update({
                    lat: cur.lat,
                    lon: cur.lon,
                    status: isTripStarted ? "riding" : "coming"
                });

                if (isTripStarted && lastPos) {
                    const d = ymaps.coordSystem.geo.getDistance([lastPos.lat, lastPos.lon], coords);
                    if (d > 5) { // 5 metrdan ortiq yursa hisoblaydi
                        totalDist += d;
                        updateUI();
                    }
                }
                lastPos = cur;
            }, (err) => console.error(err), { enableHighAccuracy: true });
        }

        function drawRoute(lat, lon) {
            navigator.geolocation.getCurrentPosition(p => {
                multiRoute = new ymaps.multiRouter.MultiRoute({
                    referencePoints: [[p.coords.latitude, p.coords.longitude], [parseFloat(lat), parseFloat(lon)]],
                    params: { routingMode: 'auto' }
                }, { boundsAutoApply: true, routeActiveStrokeColor: "#FFD700" });
                myMap.geoObjects.add(multiRoute);
            });
        }

        function updateUI() {
            const km = totalDist / 1000;
            const price = 5000 + (km * 2500); 
            const finalPrice = Math.round(price / 500) * 500;
            
            document.getElementById('km').innerText = km.toFixed(2);
            document.getElementById('summa').innerText = finalPrice;

            db.ref('trips/' + orderId).update({
                km: km.toFixed(2),
                price: finalPrice
            });
        }

        function arrived() {
            document.getElementById('status').innerText = "🏁 Mijoz kutilmoqda";
            document.getElementById('btnArrived').style.display = 'none';
            document.getElementById('btnStart').style.display = 'inline-block';
            if (multiRoute) myMap.geoObjects.remove(multiRoute);
            db.ref('trips/' + orderId).update({ status: "arrived" });
        }

        function startTrip() {
            isTripStarted = true;
            totalDist = 0;
            document.getElementById('status').innerText = "🚕 Safar davom etmoqda...";
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnFinish').style.display = 'inline-block';
            db.ref('trips/' + orderId).update({ status: "started" });
        }

        function finishTrip() {
            const finalSum = document.getElementById('summa').innerText;
            db.ref('trips/' + orderId).update({ status: "finished" });
            tg.sendData("finish_" + finalSum);
            setTimeout(() => tg.close(), 500);
        }
        
        function callClient() {
    // orderId - bu mijozning Telegram ID-si. 
    // Bu link bosilganda Telegram mijozning profilini ochadi va tepada "Qo'ng'iroq qilish" chiqadi
    window.location.href = "tg://user?id=" + orderId;
}


        window.onload = init;
    </script>
</body>
</html>
