<!DOCTYPE html>
<html>
<head>
    <title>AXI TAXI - Navigator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 75vh; background: #222; }
        .info-panel { padding: 10px; text-align: center; height: 25vh; box-sizing: border-box; background: #1a1a1a; border-top: 2px solid #FFD700; }
        #status { font-weight: bold; color: orange; margin: 5px 0; font-size: 16px; }
        #coords { font-size: 12px; color: #FFD700; margin-bottom: 5px; }
        .btn-refresh { padding: 8px 20px; background: #FFD700; border: none; border-radius: 5px; font-weight: bold; color: black; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="info-panel">
        <h2 style="color: #FFD700; margin: 0;">AXI TAXI</h2>
        <p id="status">🟢 GPS kutilmoqda...</p>
        <div id="coords">📍 Manzil aniqlanmoqda...</div>
        <button class="btn-refresh" onclick="location.reload()">🔄 Xaritani yangilash</button>
    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const firebaseConfig = {
        databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userId = "unknown";
    let myMap, multiRoute, driverMarker;
    let userLat, userLon;
    let routeCreated = false;

    const urlParams = new URLSearchParams(window.location.search);
    const clientLat = urlParams.get('clat');
    const clientLon = urlParams.get('clon');

    function initApp() {
        const user = tg.initDataUnsafe?.user;
        userId = user ? user.id : "driver_test";

        ymaps.ready(function () {
            myMap = new ymaps.Map("map", {
                center: [39.997, 65.924], 
                zoom: 15,
                controls: ['zoomControl', 'geolocationControl']
            });
            
            // Haydovchi metkasini yaratamiz
            driverMarker = new ymaps.Placemark([0,0], {}, {
                preset: 'islands#blueAutoCircleIcon'
            });
            myMap.geoObjects.add(driverMarker);
            
            startGPS();
        });
    }

    function startGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;

                database.ref('driver_location/' + userId).update({
                    lat: userLat,
                    lon: userLon,
                    last_update: Date.now()
                });

                document.getElementById('coords').innerHTML = "📍 Siz: " + userLat.toFixed(5) + ", " + userLon.toFixed(5);
                
                // Haydovchi nuqtasini harakatlantiramiz
                if (driverMarker) {
                    driverMarker.geometry.setCoordinates([userLat, userLon]);
                }

                if (clientLat && clientLon) {
                    if (!routeCreated) {
                        document.getElementById('status').innerHTML = "🚕 Yo'nalish chizildi";
                        document.getElementById('status').style.color = "#00FF00";
                        drawRoute(userLat, userLon, clientLat, clientLon);
                        routeCreated = true; 
                    }
                } else {
                    document.getElementById('status').innerHTML = "🟢 Liniyadasiz";
                    myMap.setCenter([userLat, userLon], 16);
                }

            }, function(err) {
                document.getElementById('status').innerHTML = "🔴 GPS-ni yoqing!";
                document.getElementById('status').style.color = "red";
            }, { 
                enableHighAccuracy: true,
                maximumAge: 1000 
            });
        }
    }

    function drawRoute(sLat, sLon, eLat, eLon) {
        if (multiRoute) {
            myMap.geoObjects.remove(multiRoute);
        }

        multiRoute = new ymaps.multiRouter.MultiRoute({
            referencePoints: [
                [parseFloat(sLat), parseFloat(sLon)],
                [parseFloat(eLat), parseFloat(eLon)]
            ],
            params: { routingMode: 'auto' }
        }, {
            boundsAutoApply: true,
            routeActiveStrokeWidth: 6,
            routeActiveStrokeColor: "#0000FF",
            wayPointVisible: true
        });

        myMap.geoObjects.add(multiRoute);
    }

    window.onload = initApp;
    </script>
</body>
</html>
