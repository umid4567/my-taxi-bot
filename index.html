<!DOCTYPE html>
<html lang="uz">
<head>
    <title>Umut Taxi - Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=784e6223-9556-4b82-8419-75691062064c" type="text/javascript"></script>
    <style>
        html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
        #info { position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 100; background: white; padding: 15px; border-radius: 12px; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info">Manzil aniqlanmoqda...</div>
    <div id="map"></div>

    <script type="text/javascript">
        const firebaseConfig = {
            databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        ymaps.ready(init);

        function init(){
            var myMap = new ymaps.Map("map", { center: [39.9469, 66.2625], zoom: 14, controls: ['zoomControl'] });

            var driverMarker = new ymaps.Placemark([39.9469, 66.2625], {}, {
                iconLayout: 'default#image',
                iconImageHref: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
                iconImageSize: [36, 36], iconImageOffset: [-18, -18]
            });

            var clientMarker = new ymaps.Placemark([39.9469, 66.2625], {}, { preset: 'islands#blueCircleDotIcon' });
            myMap.geoObjects.add(driverMarker).add(clientMarker);

            var multiRoute;

            function updateRoute(d_coords, c_coords) {
                if (multiRoute) { myMap.geoObjects.remove(multiRoute); }
                multiRoute = new ymaps.multiRouter.MultiRoute({
                    referencePoints: [d_coords, c_coords],
                    params: { routingMode: 'auto' }
                }, { wayPointVisible: false, routeActiveStrokeWidth: 5, routeActiveStrokeColor: "#ffcc00" });
                myMap.geoObjects.add(multiRoute);
                multiRoute.model.events.add('requestsuccess', function() {
                    var activeRoute = multiRoute.getActiveRoute();
                    if (activeRoute) {
                        document.getElementById('info').innerHTML = "🚕 Masofa: <b>" + activeRoute.properties.get("distance").text + "</b>";
                    }
                });
            }

            // TEZKOR GPS ANIQLASH
            navigator.geolocation.getCurrentPosition(function(position) {
                let c_pos = [position.coords.latitude, position.coords.longitude];
                clientMarker.geometry.setCoordinates(c_pos);
                myMap.setCenter(c_pos, 14);
                db.ref('client_location').set({ lat: c_pos[0], lon: c_pos[1] });
                
                // Haydovchini kutish
                db.ref('driver_location').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        let d_pos = [data.lat, data.lon];
                        driverMarker.geometry.setCoordinates(d_pos);
                        updateRoute(d_pos, c_pos);
                    }
                });
            }, function(err) {
                document.getElementById('info').innerText = "GPS ruxsat berilmadi!";
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
