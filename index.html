<!DOCTYPE html>
<html lang="uz">
<head>
    <title>AXI TAXI - Taksimetr</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #map { width: 100%; height: 45vh; }
        .taxi-panel { height: 55vh; padding: 15px; text-align: center; background: #252525; border-top: 4px solid #FFD700; border-radius: 25px 25px 0 0; box-sizing: border-box; overflow-y: auto; }
        .price-display { font-size: 40px; font-weight: bold; color: #00FF00; margin: 5px 0; }
        .distance-display { font-size: 18px; color: #aaa; }
        .btn { width: 95%; padding: 15px; margin: 5px 0; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-arrived { background: #ffc107; color: black; }
        .btn-start { background: #28a745; color: white; display: none; }
        .btn-finish { background: #dc3545; color: white; display: none; }
        .btn-call { background: #28a745; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="taxi-panel">
        <div id="status">🚕 Mijozga borilmoqda...</div>
        <div class="distance-display"><span id="km">0.00</span> km</div>
        <div class="price-display"><span id="summa">0</span> so'm</div>
        
        <button id="btnArrived" class="btn btn-arrived" onclick="arrived()">🏁 Keldim</button>
        <button id="btnStart" class="btn btn-start" onclick="startTrip()">🚀 Safarni boshlash</button>
        <button id="btnFinish" class="btn btn-finish" onclick="finishTrip()">🏁 Safarni yakunlash</button>
        
        <button class="btn btn-call" onclick="callClient()">📞 MIJOZGA QO'NG'IROQ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id') || params.get('id'); 
        const clat = params.get('clat');
        const clon = params.get('clon');

        let myMap, multiRoute, driverMarker = null, lastPos = null;
        let totalDist = 0;
        let isTripStarted = false;

        function init() {
    ymaps.ready(() => {
        // Xarita markazini mijoz turgan joyga (clat, clon) qaratamiz
        const clientLat = parseFloat(clat);
        const clientLon = parseFloat(clon);

        myMap = new ymaps.Map("map", { 
            center: [clientLat, clientLon], 
            zoom: 14,
            controls: ['zoomControl', 'geolocationControl']
        });
        
        startTracking();
    });
}

function startTracking() {
    navigator.geolocation.watchPosition(p => {
        const curLat = p.coords.latitude;
        const curLon = p.coords.longitude;
        const coords = [curLat, curLon];

        // 1. Haydovchi markerini yangilash
        if (!driverMarker) {
            driverMarker = new ymaps.Placemark(coords, {}, { 
                iconLayout: 'default#image', 
                iconImageHref: 'https://cdn-icons-png.flaticon.com/512/741/741407.png', 
                iconImageSize: [40, 40],
                iconImageOffset: [-20, -20]
            });
            myMap.geoObjects.add(driverMarker);
        } else {
            driverMarker.geometry.setCoordinates(coords);
        }

        // 2. Yo'nalishni FAQAT haydovchi joyi aniqlanganda chizamiz
        // Haydovchidan (cur) -> Mijozgacha (clat, clon)
        if (clat && clon) {
            drawRoute(curLat, curLon, clat, clon);
        }

        // 3. Firebase'ni yangilash
        if(orderId) {
            db.ref('orders/' + orderId).update({
                driver_lat: curLat,
                driver_lon: curLon
            });
        }
    }, err => console.error(err), { enableHighAccuracy: true });
}

function drawRoute(sLat, sLon, eLat, eLon) {
    // Agar eski yo'nalish bo'lsa o'chiramiz
    if (multiRoute) {
        myMap.geoObjects.remove(multiRoute);
    }

    multiRoute = new ymaps.multiRouter.MultiRoute({
        // START: Haydovchi, END: Mijoz
        referencePoints: [[sLat, sLon], [parseFloat(eLat), parseFloat(eLon)]],
        params: { routingMode: 'auto' }
    }, { 
        boundsAutoApply: false, // Xarita doimiy sakrab ketmasligi uchun false qildik
        routeActiveStrokeColor: "#FFD700",
        wayPointVisible: false // Ortiqcha markerlarni o'chiradi
    });
    
    myMap.geoObjects.add(multiRoute);
}




        function drawRoute(lat, lon) {
            multiRoute = new ymaps.multiRouter.MultiRoute({
                referencePoints: [[39.9469, 66.2625], [parseFloat(lat), parseFloat(lon)]],
                params: { routingMode: 'auto' }
            }, { boundsAutoApply: true, routeActiveStrokeColor: "#FFD700" });
            myMap.geoObjects.add(multiRoute);
        }

        function updateUI() {
            const km = totalDist / 1000;
            const startPrice = 5000; 
            const kmPrice = 2500;    
            
            const price = startPrice + (km * kmPrice);
            const finalPrice = Math.round(price / 500) * 500;

            document.getElementById('km').innerText = km.toFixed(2);
            document.getElementById('summa').innerText = finalPrice;
            
            if(orderId) {
                db.ref('orders/' + orderId).update({ 
                    km: km.toFixed(2), 
                    price: finalPrice 
                });
            }
        }

        function arrived() {
            document.getElementById('status').innerText = "🏁 Mijoz kutilmoqda";
            document.getElementById('btnArrived').style.display = 'none';
            document.getElementById('btnStart').style.display = 'inline-block';
            if (multiRoute) myMap.geoObjects.remove(multiRoute);
            if(orderId) db.ref('orders/' + orderId).update({ status: "arrived" });
        }

        function startTrip() {
            isTripStarted = true;
            totalDist = 0;
            document.getElementById('status').innerText = "🚀 Safar davom etmoqda...";
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnFinish').style.display = 'inline-block';
            if(orderId) db.ref('orders/' + orderId).update({ status: "riding", km: "0.00", price: 5000 });
        }

        function finishTrip() {
            const finalSum = document.getElementById('summa').innerText;
            if(orderId) {
                db.ref('orders/' + orderId).update({ status: "finished" });
                setTimeout(() => {
                    db.ref('orders/' + orderId).remove();
                }, 5000);
            }
            tg.sendData("finish_" + finalSum);
            setTimeout(() => tg.close(), 500);
        }
        
        function callClient() {
            if (!orderId) {
                alert("ID topilmadi!");
                return;
            }
            db.ref('users/' + orderId).once('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData && userData.phone) {
                    window.location.href = "tel:" + userData.phone;
                } else {
                    alert("Mijoz telefon raqami topilmadi!");
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
