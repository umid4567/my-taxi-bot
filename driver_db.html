<!DOCTYPE html>
<html>
<head>
    <title>Axi Taxi - Haydovchi Paneli</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; text-align: center; }
        .order-card { background: #1e1e1e; border: 2px solid #fbc02d; border-radius: 15px; padding: 20px; margin-top: 20px; display: none; box-shadow: 0 0 20px rgba(251, 192, 45, 0.2); }
        .dist { font-size: 30px; color: #fbc02d; font-weight: bold; margin: 10px 0; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-accept { background: #4caf50; color: white; }
        .btn-reject { background: #f44336; color: white; }
        #waiting { margin-top: 50px; color: #777; font-size: 18px; }
        .hint { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="orderSound" src="https://www.soundjay.com/buttons/sounds/beep-07a.mp3" preload="auto"></audio>

    <div id="waiting">🔄 Yangi buyurtmalar kutilmoqda...</div>

    <div id="orderBox" class="order-card">
        <div style="font-size: 18px; color: #aaa;">Yangi buyurtma!</div>
        <div id="clientName" style="font-size: 24px; font-weight: bold; margin: 10px 0;">Mijoz</div>
        <div class="dist"><span id="distance">---</span> km</div>
        <button class="btn btn-accept" onclick="acceptOrder()">✅ QABUL QILISH</button>
        <button class="btn btn-reject" onclick="rejectOrder()">❌ RAD ETISH</button>
    </div>

    <p class="hint">Eslatma: Ovozli signal ishlashi uchun ekranga bir marta bosib qo'ying.</p>

    <script>
        // 1. Firebase Sozlamalari
                const config = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        
        const urlParams = new URLSearchParams(window.location.search);
        const driverId = urlParams.get('driver_id') || "noma'lum";

        let currentOrder = null;
        let myPos = null;

        // 1. HAYDOVCHINI KUZATISH (GPS DOIMIY YOQIQ)
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                myPos = [p.coords.latitude, p.coords.longitude];
                console.log("Mening joyim yangilandi:", myPos);

                // Haydovchining joyini bazada ham yangilab turamiz (agar kerak bo'lsa)
                if (driverId !== "noma'lum") {
                    db.ref('drivers/' + driverId).update({
                        lat: myPos[0],
                        lon: myPos[1],
                        lastUpdate: new Date().getTime()
                    });
                }
                
                // Agar ekran ochiq bo'lsa, masofani qayta hisoblaymiz
                if (currentOrder) {
                    calculateRealDistance(currentOrder);
                }
            }, err => {
                console.error("GPS xatosi:", err);
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        }

        // 2. Buyurtmalarni kuzatish
        db.ref('orders').on('value', (snapshot) => {
            const orders = snapshot.val();
            let foundOrder = false;

            if (orders) {
                for (let key in orders) {
                    const order = orders[key];
                    if (order.status === "waiting") {
                        currentOrder = { id: key, ...order };
                        showOrder(currentOrder);
                        foundOrder = true;
                        break; 
                    }
                }
            }
            if (!foundOrder) hideOrder();
        });

        function showOrder(order) {
            document.getElementById('waiting').style.display = 'none';
            document.getElementById('orderBox').style.display = 'block';
            document.getElementById('clientName').innerText = order.name;
            
            const sound = document.getElementById('orderSound');
            sound.play().catch(() => {});

            calculateRealDistance(order);
        }

        // MASOFANI HISOBLASH FUNKSIYASI
        function calculateRealDistance(order) {
            if (myPos && typeof ymaps !== 'undefined' && ymaps.coordSystem) {
                const d = ymaps.coordSystem.geo.getDistance(myPos, [order.lat, order.lon]);
                const km = (d / 1000).toFixed(1);
                document.getElementById('distance').innerText = km;
            } else {
                document.getElementById('distance').innerText = "Aniqlanmoqda...";
            }
        }

        function hideOrder() {
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('orderBox').style.display = 'none';
            currentOrder = null;
        }

        function acceptOrder() {
            if (!currentOrder || !currentOrder.id) return;
            
            db.ref('orders/' + currentOrder.id).update({
                status: "accepted",
                driver_id: driverId
            }).then(() => {
                // Xaritaga o'tamiz
                window.location.href = `index.html?order_id=${currentOrder.id}&clat=${currentOrder.lat}&clon=${currentOrder.lon}`;
            });
        }

        function rejectOrder() {
            hideOrder();
        }

    </script>
</body>
</html>
