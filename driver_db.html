<!DOCTYPE html>
<html>
<head>
    <title>Axi Taxi - Haydovchi Paneli</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ&apikey=087cbcce-d8e3-46e1-be82-29127bd69ae5" type="text/javascript"></script>
    
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; text-align: center; }
        .order-card { background: #1e1e1e; border: 2px solid #fbc02d; border-radius: 15px; padding: 20px; margin-top: 20px; display: none; box-shadow: 0 0 20px rgba(251, 192, 45, 0.2); transition: 0.3s; }
        .dist { font-size: 32px; color: #fbc02d; font-weight: bold; margin: 10px 0; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-accept { background: #4caf50; color: white; }
        .btn-accept:active { background: #388e3c; transform: scale(0.98); }
        .btn-reject { background: #f44336; color: white; }
        #waiting { margin-top: 50px; color: #777; font-size: 18px; }
        .hint { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <audio id="orderSound" src="https://www.soundjay.com/buttons/sounds/beep-07a.mp3" preload="auto"></audio>

    <div id="waiting">🔄 Yangi buyurtmalar kutilmoqda...</div>

    <div id="orderBox" class="order-card">
        <div style="font-size: 18px; color: #aaa;">Yangi buyurtma!</div>
        <div id="clientName" style="font-size: 24px; font-weight: bold; margin: 10px 0;">Mijoz</div>
        <div class="dist"><span id="distance">---</span> km</div>
        <button class="btn btn-accept" onclick="acceptOrder()">✅ QABUL QILISH</button>
        <button class="btn btn-reject" onclick="hideOrder()">❌ RAD ETISH</button>
    </div>

    <p class="hint">Eslatma: Ovozli signal ishlashi uchun ekranga bir marta bosib qo'ying.</p>

    <script>
        const firebaseConfig = { databaseURL: "https://umut-taxi-default-rtdb.europe-west1.firebasedatabase.app/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const urlParams = new URLSearchParams(window.location.search);
        const driverId = urlParams.get('driver_id') || "noma'lum";

        let currentOrder = null;
        let myPos = null;

        // Joylashuvni kuzatish
        navigator.geolocation.watchPosition(p => {
            myPos = [p.coords.latitude, p.coords.longitude];
            if (currentOrder) updateDistanceDisplay(currentOrder);
        }, err => console.error("Geolokatsiya xatosi:", err), { enableHighAccuracy: true });

        // Buyurtmalarni real-vaqtda kuzatish
        db.ref('orders').on('value', (snapshot) => {
            const orders = snapshot.val();
            let foundOrder = false;

            if (orders) {
                for (let key in orders) {
                    const order = orders[key];
                    // Faqat 'waiting' statusidagi buyurtmalarni ko'rsatamiz
                    if (order.status === "waiting") {
                        currentOrder = { id: key, ...order };
                        showOrder(currentOrder);
                        foundOrder = true;
                        break; 
                    }
                }
            }
            if (!foundOrder) hideOrder();
        });

        function showOrder(order) {
            document.getElementById('waiting').style.display = 'none';
            document.getElementById('orderBox').style.display = 'block';
            document.getElementById('clientName').innerText = order.name;
            
            const sound = document.getElementById('orderSound');
            sound.play().catch(e => console.log("Ovoz pleyerda xato:", e));
            
            updateDistanceDisplay(order);
        }

        function updateDistanceDisplay(order) {
            // Yandex Maps tayyorligini tekshirish
            if (myPos && typeof ymaps !== 'undefined' && ymaps.coordSystem) {
                try {
                    const d = ymaps.coordSystem.geo.getDistance(myPos, [order.lat, order.lon]);
                    const km = (d / 1000).toFixed(1);
                    document.getElementById('distance').innerText = km;
                } catch(e) {
                    document.getElementById('distance').innerText = "---";
                }
            }
        }

        function hideOrder() {
            document.getElementById('waiting').style.display = 'block';
            document.getElementById('orderBox').style.display = 'none';
            currentOrder = null;
        }

                function acceptOrder() {
            if (!currentOrder || !currentOrder.id) return;

            const oId = currentOrder.id;
            const oLat = currentOrder.lat;
            const oLon = currentOrder.lon;

            // 1. Buyurtmani band qilish
            db.ref('orders/' + oId).transaction((order) => {
                if (order && order.status === "waiting") {
                    order.status = "accepted";
                    order.driver_id = driverId;
                    order.client_notified = false; // Bot uchun bayroqcha
                    return order;
                }
                return; 
            }, (error, committed, snapshot) => {
                if (committed) {
                    // 2. MUHIM: Tranzaksiyadan so'ng notified maydonini qayta tekshirib, False qilib qo'yamiz
                    // Bu main.py xabarni ko'rishi uchun kafolat beradi
                    db.ref('orders/' + oId).update({
                        client_notified: false
                    }).then(() => {
                        console.log("Mijozga bildirishnoma signali yuborildi.");
                        const mapUrl = `index.html?order_id=${oId}&clat=${oLat}&clon=${oLon}`;
                        window.location.href = mapUrl;
                    });
                } else {
                    alert("Kechirasiz, bu buyurtmani boshqa haydovchi qabul qilib bo'ldi! 🛑");
                    hideOrder();
                }
            });
        }

    </script>
</body>
</html>
